<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hagler Process — Invoice Decision Guide</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #2D3A50;
    --mid-blue: #6891BB;
    --accent-blue: #4472C4;
    --bg: #F6F4F0;
    --card-bg: #FFFFFF;
    --text: #2D3A50;
    --text-muted: #6B7A8D;
    --border: #E2DFD8;
    --yes-bg: #E8F5E9;
    --yes-text: #2E7D32;
    --yes-border: #A5D6A7;
    --no-bg: #FFF3E0;
    --no-text: #E65100;
    --no-border: #FFCC80;
    --hold-bg: #EDE7F6;
    --hold-text: #4527A0;
    --hold-border: #B39DDB;
    --action-bg: #E3F2FD;
    --action-text: #1565C0;
    --action-border: #90CAF9;
    --shadow-sm: 0 1px 3px rgba(45,58,80,0.06);
    --shadow-md: 0 4px 16px rgba(45,58,80,0.08);
    --radius: 12px;
    --radius-lg: 20px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px;
  }

  .container { max-width: 720px; margin: 0 auto; }

  .header {
    text-align: center;
    margin-bottom: 32px;
    padding: 32px 24px;
    background: var(--navy);
    border-radius: var(--radius-lg);
    color: white;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(104,145,187,0.15);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -40px; left: -30px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: rgba(68,114,196,0.1);
  }
  .header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    position: relative;
  }
  .header p { font-size: 14px; opacity: 0.7; position: relative; }

  .progress-bar {
    display: flex;
    align-items: center;
    margin-bottom: 28px;
    padding: 0 8px;
  }
  .progress-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600;
    color: var(--text-muted);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    flex-shrink: 0;
  }
  .progress-dot.active {
    background: var(--accent-blue);
    color: white;
    transform: scale(1.15);
    box-shadow: 0 2px 8px rgba(68,114,196,0.35);
  }
  .progress-dot.done { background: var(--yes-text); color: white; }
  .progress-line { flex: 1; height: 2px; background: var(--border); transition: background 0.3s; }
  .progress-line.done { background: var(--yes-text); }

  .card {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    padding: 32px 28px;
    margin-bottom: 20px;
    animation: cardIn 0.45s cubic-bezier(0.22, 1, 0.36, 1);
    overflow: hidden;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .step-badge {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 16px;
  }
  .step-badge.question { background: var(--no-bg); color: var(--no-text); }
  .step-badge.action { background: var(--action-bg); color: var(--action-text); }
  .step-badge.result-yes { background: var(--yes-bg); color: var(--yes-text); }
  .step-badge.result-no { background: var(--hold-bg); color: var(--hold-text); }

  .card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    font-weight: 400;
    line-height: 1.35;
    margin-bottom: 10px;
  }
  .card .context {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.65;
    margin-bottom: 24px;
  }
  .card .context strong { color: var(--text); font-weight: 600; }

  .btn-group { display: flex; gap: 12px; }
  .btn {
    flex: 1;
    padding: 14px 20px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--card-bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
    line-height: 1.3;
  }
  .btn:hover { border-color: var(--accent-blue); background: #F0F5FB; transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .btn:active { transform: translateY(0); }
  .btn-yes { border-color: var(--yes-border); background: var(--yes-bg); color: var(--yes-text); }
  .btn-yes:hover { border-color: var(--yes-text); background: #D7ECD9; }
  .btn-no { border-color: var(--no-border); background: var(--no-bg); color: var(--no-text); }
  .btn-no:hover { border-color: var(--no-text); background: #FFE8CC; }

  .result-box {
    padding: 20px 24px;
    border-radius: var(--radius);
    border-left: 4px solid;
    margin-bottom: 16px;
  }
  .result-box.invoice { background: var(--yes-bg); border-color: var(--yes-text); }
  .result-box.hold { background: var(--hold-bg); border-color: var(--hold-text); }
  .result-box.wait { background: var(--no-bg); border-color: var(--no-text); }
  .result-box h3 { font-weight: 700; font-size: 16px; margin-bottom: 6px; }
  .result-box.invoice h3 { color: var(--yes-text); }
  .result-box.hold h3 { color: var(--hold-text); }
  .result-box.wait h3 { color: var(--no-text); }
  .result-box p { font-size: 14px; color: var(--text); line-height: 1.6; }

  .reason-list { list-style: none; margin: 16px 0; }
  .reason-list li {
    padding: 12px 16px;
    background: rgba(255,255,255,0.5);
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 14px;
    line-height: 1.5;
    border: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .reason-list li .icon {
    flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
    background: var(--no-bg); display: flex; align-items: center; justify-content: center;
    font-size: 11px; margin-top: 1px;
  }

  /* Navigation row */
  .nav-row {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    align-items: center;
  }
  .back-btn, .restart-btn-sm {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    background: var(--card-bg);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .back-btn:hover, .restart-btn-sm:hover {
    border-color: var(--accent-blue);
    color: var(--accent-blue);
    background: #F0F5FB;
    transform: translateY(-1px);
  }
  .restart-btn-sm { border-style: dashed; }
  .back-btn svg { width: 14px; height: 14px; }

  .print-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border: 2px solid var(--accent-blue);
    border-radius: var(--radius);
    background: var(--accent-blue);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: white;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-left: auto;
  }
  .print-btn:hover { background: #3661A8; border-color: #3661A8; transform: translateY(-1px); box-shadow: var(--shadow-sm); }
  .print-btn svg { width: 14px; height: 14px; }

  /* Path trail */
  .path-trail {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 20px;
    padding: 12px 16px;
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    align-items: center;
  }
  .path-chip {
    font-size: 11px; font-weight: 500;
    padding: 3px 10px; border-radius: 100px;
    background: #F0F0EC; color: var(--text-muted);
  }
  .path-chip.yes { background: var(--yes-bg); color: var(--yes-text); }
  .path-chip.no { background: var(--no-bg); color: var(--no-text); }
  .path-arrow { color: var(--border); font-size: 11px; display: flex; align-items: center; }

  /* ============ PRINT SUMMARY ============ */
  .print-summary { display: none; }

  .ps-header {
    text-align: center;
    padding-bottom: 16px;
    border-bottom: 2px solid var(--navy);
    margin-bottom: 20px;
  }
  .ps-header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--navy);
    margin-bottom: 4px;
  }
  .ps-header p { font-size: 12px; color: var(--text-muted); }
  .ps-meta { font-size: 12px; color: var(--text-muted); margin-bottom: 24px; text-align: center; }

  .ps-step {
    display: flex;
    gap: 14px;
    margin-bottom: 4px;
    position: relative;
  }
  .ps-step::before {
    content: '';
    position: absolute;
    left: 15px; top: 34px; bottom: -4px;
    width: 1.5px;
    background: var(--border);
  }
  .ps-step:last-child::before { display: none; }

  .ps-num {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    flex-shrink: 0; z-index: 1;
  }
  .ps-num.q { background: var(--no-bg); color: var(--no-text); border: 1.5px solid var(--no-border); }
  .ps-num.a { background: var(--action-bg); color: var(--action-text); border: 1.5px solid var(--action-border); }
  .ps-num.ry { background: var(--yes-bg); color: var(--yes-text); border: 1.5px solid var(--yes-border); }
  .ps-num.rn { background: var(--hold-bg); color: var(--hold-text); border: 1.5px solid var(--hold-border); }

  .ps-content { flex: 1; padding-bottom: 16px; }
  .ps-question { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
  .ps-answer {
    font-size: 13px; padding: 4px 10px; border-radius: 6px;
    display: inline-block; font-weight: 600;
  }
  .ps-answer.yes { background: var(--yes-bg); color: var(--yes-text); }
  .ps-answer.no { background: var(--no-bg); color: var(--no-text); }
  .ps-answer.action { background: var(--action-bg); color: var(--action-text); }

  .ps-result-box {
    margin-top: 8px;
    padding: 14px 18px;
    border-radius: 8px;
    border-left: 4px solid;
  }
  .ps-result-box.invoice { background: var(--yes-bg); border-color: var(--yes-text); }
  .ps-result-box.hold { background: var(--hold-bg); border-color: var(--hold-text); }
  .ps-result-box.wait { background: var(--no-bg); border-color: var(--no-text); }
  .ps-result-box.discrepancy { background: var(--no-bg); border-color: var(--no-text); }
  .ps-result-box h4 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .ps-result-box.invoice h4 { color: var(--yes-text); }
  .ps-result-box.hold h4 { color: var(--hold-text); }
  .ps-result-box.wait h4 { color: var(--no-text); }
  .ps-result-box.discrepancy h4 { color: var(--no-text); }
  .ps-result-box p { font-size: 12px; color: var(--text); line-height: 1.5; }

  .ps-footer {
    margin-top: 24px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
  }

  /* ============ PRINT STYLES ============ */
  @media print {
    body { background: white !important; padding: 0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .header, .progress-bar, #pathTrail, #cardArea, #navRow { display: none !important; }
    .print-summary { display: block !important; padding: 20px; }
  }

  @media (max-width: 500px) {
    body { padding: 16px 10px; }
    .card { padding: 24px 18px; }
    .btn-group { flex-direction: column; }
    .header h1 { font-size: 22px; }
    .nav-row { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Can I Invoice the Customer?</h1>
    <p>Hagler Process — Bookkeeper Decision Guide</p>
  </div>

  <div class="progress-bar" id="progressBar"></div>
  <div id="navRow"></div>
  <div id="pathTrail"></div>
  <div id="cardArea"></div>
  <div class="print-summary" id="printSummary"></div>
</div>

<script>
const steps = {
  start: {
    type: 'question',
    title: 'Vendor invoice received — is this item shipping factory direct to our customer?',
    context: 'The vendor is shipping the product <strong>directly to the customer\'s location</strong>. It never passes through our facility.',
    printQ: 'Is this item shipping factory direct to our customer?',
    buttons: [
      { label: 'Yes — Factory direct', style: 'btn-yes', next: 'factoryDirectCheck', pathLabel: 'Factory direct' },
      { label: 'No — Ships through us', style: 'btn-no', next: 'pairWithPO', pathLabel: 'Not factory direct' }
    ]
  },
  factoryDirectCheck: {
    type: 'question',
    title: 'Is this factory-direct item part of a larger project requiring coordinated on-site delivery?',
    context: 'This is a <strong>rare exception</strong> — for example, a field service project where multiple items must arrive together before work can begin. In most cases, the answer is No.',
    printQ: 'Is this part of a larger project requiring coordinated on-site delivery?',
    buttons: [
      { label: 'No — Standard shipment', style: 'btn-yes', next: 'invoiceNow', pathLabel: 'Standard shipment' },
      { label: 'Yes — Part of larger project', style: 'btn-no', next: 'waitForPickTicket', pathLabel: 'Larger project' }
    ]
  },
  invoiceNow: {
    type: 'result-yes',
    title: 'Invoice the customer now',
    result: 'invoice'
  },
  pairWithPO: {
    type: 'action',
    title: 'Pair the vendor invoice with the original Purchase Order',
    context: 'Find the matching PO. Check the <strong>PO folder</strong> first. If items have already been received, the PO may be in the <strong>Waiting on Invoice</strong> folder.',
    printQ: 'Pair the vendor invoice with the original PO.',
    buttons: [
      { label: 'Done — Continue', style: 'btn-yes', next: 'receivedCheck', pathLabel: 'PO paired' }
    ]
  },
  receivedCheck: {
    type: 'question',
    title: 'Have the items been physically received at our facility?',
    context: 'Check whether the goods listed on the vendor invoice have actually arrived at our location.',
    printQ: 'Have the items been physically received at our facility?',
    buttons: [
      { label: 'Yes — Items received', style: 'btn-yes', next: 'matchCheck', pathLabel: 'Items received' },
      { label: 'No — Not yet received', style: 'btn-no', next: 'backToPOFolder', pathLabel: 'Not received' }
    ]
  },
  backToPOFolder: {
    type: 'result-no',
    title: 'Place paperwork back in the PO folder',
    result: 'wait'
  },
  matchCheck: {
    type: 'question',
    title: 'Do the items received match the items on the vendor invoice?',
    context: 'Verify that quantities and line items on the vendor invoice match what was physically received.',
    printQ: 'Do the items received match the vendor invoice?',
    buttons: [
      { label: 'Yes — They match', style: 'btn-yes', next: 'postVendorInvoice', pathLabel: 'Items match' },
      { label: 'No — Discrepancy', style: 'btn-no', next: 'resolveDiscrepancy', pathLabel: 'Discrepancy' }
    ]
  },
  resolveDiscrepancy: {
    type: 'result-no',
    title: 'Resolve the discrepancy',
    result: 'discrepancy'
  },
  postVendorInvoice: {
    type: 'action',
    title: 'You may post the vendor invoice — but do NOT invoice the customer yet',
    context: 'The vendor invoice can be entered into the system. However, <strong>posting the vendor invoice does not mean we bill the customer</strong>. There may still be work to do before the order is complete.',
    printQ: 'Post the vendor invoice (does NOT mean invoice the customer).',
    buttons: [
      { label: 'Continue — Check for Pick Ticket', style: 'btn-yes', next: 'pickTicketCheck', pathLabel: 'Vendor invoice posted' }
    ]
  },
  pickTicketCheck: {
    type: 'question',
    title: 'Is there a Pick Ticket in the Ready to Invoice folder?',
    context: 'The <strong>Pick Ticket</strong> confirms that items have been shipped or delivered to the customer. This is the final authorization to create a customer invoice.',
    printQ: 'Is there a Pick Ticket in the Ready to Invoice folder?',
    buttons: [
      { label: 'Yes — Pick Ticket present', style: 'btn-yes', next: 'invoiceNowAfterPT', pathLabel: 'Pick Ticket found' },
      { label: 'No — No Pick Ticket yet', style: 'btn-no', next: 'waitForPickTicket', pathLabel: 'No Pick Ticket' }
    ]
  },
  invoiceNowAfterPT: {
    type: 'result-yes',
    title: 'Invoice the customer now',
    result: 'invoice'
  },
  waitForPickTicket: {
    type: 'result-no',
    title: 'Do NOT invoice the customer yet',
    result: 'hold'
  }
};

const resultMeta = {
  invoice: { title: 'Invoice the customer now', desc: 'All conditions have been met. Create the customer invoice and process it through normal billing.', cls: 'invoice' },
  hold: { title: 'Hold — Wait for the Pick Ticket', desc: 'The order is not yet complete. Do not create a customer invoice until the Pick Ticket appears in the Ready to Invoice folder.', cls: 'hold' },
  wait: { title: 'Items not received yet', desc: 'Pair the vendor invoice with the PO and place the paperwork back into the PO folder. Once items are physically received, restart from the receiving step.', cls: 'wait' },
  discrepancy: { title: 'Discrepancy between invoice and receipt', desc: 'The items received do not match the vendor invoice. Do not post the vendor invoice. Contact purchasing or the vendor to resolve.', cls: 'discrepancy' }
};

let history = [];
let currentStep = 'start';

function isResult(key) {
  const s = steps[key];
  return s && (s.type === 'result-yes' || s.type === 'result-no');
}

function renderProgress() {
  const bar = document.getElementById('progressBar');
  const total = history.length + 1;
  let html = '';
  for (let i = 0; i < total; i++) {
    if (i > 0) html += `<div class="progress-line ${i < total - 1 ? 'done' : ''}"></div>`;
    const isActive = i === total - 1;
    const isDone = i < total - 1;
    html += `<div class="progress-dot ${isActive ? 'active' : ''} ${isDone ? 'done' : ''}">${isDone ? '&#10003;' : i + 1}</div>`;
  }
  bar.innerHTML = html;
}

function renderNav() {
  const row = document.getElementById('navRow');
  const atResult = isResult(currentStep);
  let html = '<div class="nav-row">';
  if (history.length > 0) {
    html += `<button class="back-btn" onclick="goBack()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3L5 8l5 5"/></svg>Back</button>`;
  }
  html += `<button class="restart-btn-sm" onclick="restart()">↺ Start over</button>`;
  if (atResult) {
    html += `<button class="print-btn" onclick="printResults()"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5V1h8v4"/><rect x="2" y="5" width="12" height="6" rx="1"/><path d="M4 11v4h8v-4"/><path d="M12 8h1"/></svg>Print results</button>`;
  }
  html += '</div>';
  row.innerHTML = html;
}

function renderPathTrail() {
  const trail = document.getElementById('pathTrail');
  if (history.length === 0) { trail.innerHTML = ''; return; }
  let html = '<div class="path-trail">';
  history.forEach((h, i) => {
    const cls = h.style === 'btn-yes' ? 'yes' : 'no';
    if (i > 0) html += '<div class="path-arrow">›</div>';
    html += `<div class="path-chip ${cls}">${h.pathLabel}</div>`;
  });
  html += '</div>';
  trail.innerHTML = html;
}

function renderCard() {
  const area = document.getElementById('cardArea');
  const step = steps[currentStep];
  let html = '<div class="card">';

  if (step.type === 'question') {
    html += '<div class="step-badge question">Decision</div>';
    html += `<h2>${step.title}</h2>`;
    html += `<div class="context">${step.context}</div>`;
    html += '<div class="btn-group">';
    step.buttons.forEach(b => {
      html += `<button class="btn ${b.style}" onclick="goTo('${b.next}','${b.pathLabel.replace(/'/g,"\\'")}','${b.style}')">${b.label}</button>`;
    });
    html += '</div>';
  } else if (step.type === 'action') {
    html += '<div class="step-badge action">Action required</div>';
    html += `<h2>${step.title}</h2>`;
    html += `<div class="context">${step.context}</div>`;
    html += '<div class="btn-group">';
    step.buttons.forEach(b => {
      html += `<button class="btn ${b.style}" onclick="goTo('${b.next}','${b.pathLabel.replace(/'/g,"\\'")}','${b.style}')">${b.label}</button>`;
    });
    html += '</div>';
  } else if (step.type === 'result-yes') {
    html += '<div class="step-badge result-yes">Result</div>';
    html += `<h2>${step.title}</h2>`;
    html += renderResult(step.result);
  } else if (step.type === 'result-no') {
    html += '<div class="step-badge result-no">Result</div>';
    html += `<h2>${step.title}</h2>`;
    html += renderResult(step.result);
  }

  html += '</div>';
  area.innerHTML = html;
}

function renderResult(type) {
  if (type === 'invoice') {
    return `<div class="result-box invoice"><h3>✓ Go ahead and invoice the customer</h3><p>All conditions have been met. Create the customer invoice and process it through normal billing.</p></div>`;
  }
  if (type === 'hold') {
    return `<div class="result-box hold"><h3>Hold — Wait for the Pick Ticket</h3><p>The order is not yet complete. Do not create a customer invoice until the Pick Ticket appears in the <strong>Ready to Invoice</strong> folder.</p></div>
      <p style="font-size:14px;color:var(--text-muted);margin:16px 0 8px;font-weight:600;">Common reasons there's no Pick Ticket yet:</p>
      <ul class="reason-list">
        <li><span class="icon">📦</span><span><strong>Items not yet shipped</strong> — Goods are received at our facility but haven't been sent to the customer yet.</span></li>
        <li><span class="icon">🔧</span><span><strong>Repair job</strong> — Parts have arrived, but labor still needs to be performed and the completed unit shipped later.</span></li>
        <li><span class="icon">🏗</span><span><strong>Larger project / field service</strong> — Parts are staging for a future on-site job. Labor will happen at a later date.</span></li>
      </ul>`;
  }
  if (type === 'wait') {
    return `<div class="result-box wait"><h3>Items not received yet</h3><p>Pair the vendor invoice with the PO and place the paperwork back into the <strong>PO folder</strong>. Once items are physically received, pull the paperwork and restart this process from the receiving step.</p></div>`;
  }
  if (type === 'discrepancy') {
    return `<div class="result-box wait"><h3>Discrepancy between invoice and receipt</h3><p>The items received do not match the vendor invoice. <strong>Do not post the vendor invoice.</strong> Contact purchasing or the vendor to resolve the difference before proceeding.</p></div>`;
  }
  return '';
}

function buildPrintSummary() {
  const el = document.getElementById('printSummary');
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  const timeStr = now.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });

  let html = `<div class="ps-header"><h1>Invoice Decision — Results</h1><p>Hagler Process — Bookkeeper Decision Guide</p></div>`;
  html += `<div class="ps-meta">${dateStr} at ${timeStr}</div>`;

  let stepNum = 1;
  history.forEach((h) => {
    const fromStep = steps[h.from];
    const typeClass = fromStep.type === 'action' ? 'a' : 'q';
    const answerCls = fromStep.type === 'action' ? 'action' : (h.style === 'btn-yes' ? 'yes' : 'no');

    html += `<div class="ps-step">
      <div class="ps-num ${typeClass}">${fromStep.type === 'action' ? 'A' : stepNum}</div>
      <div class="ps-content">
        <div class="ps-question">${fromStep.printQ || fromStep.title}</div>
        <div class="ps-answer ${answerCls}">${h.pathLabel}</div>
      </div>
    </div>`;
    stepNum++;
  });

  const finalStep = steps[currentStep];
  if (finalStep.result) {
    const rm = resultMeta[finalStep.result];
    const numClass = finalStep.type === 'result-yes' ? 'ry' : 'rn';
    html += `<div class="ps-step">
      <div class="ps-num ${numClass}">✓</div>
      <div class="ps-content">
        <div class="ps-question">Final determination</div>
        <div class="ps-result-box ${rm.cls}">
          <h4>${rm.title}</h4>
          <p>${rm.desc}</p>
        </div>
      </div>
    </div>`;
  }

  html += `<div class="ps-footer">Hagler Process — Invoice Decision Guide — Printed ${dateStr}</div>`;
  el.innerHTML = html;
}

function printResults() {
  buildPrintSummary();
  setTimeout(() => window.print(), 150);
}

function goTo(nextStep, pathLabel, style) {
  history.push({ from: currentStep, pathLabel, style });
  currentStep = nextStep;
  render();
}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  currentStep = prev.from;
  render();
}

function restart() {
  history = [];
  currentStep = 'start';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  renderProgress();
  renderNav();
  renderPathTrail();
  renderCard();
}

render();
</script>
</body>
</html>
